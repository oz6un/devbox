#cloud-config
# Base system for the devbox. Rendered by provision.sh (sed replaces ${TS_AUTHKEY},
# ${DEVBOX_NAME} and ${DEV_USER}); everything here runs unattended on first boot.
#
# Design: this file is the single source of truth for SYSTEM-level state
# (hardening, firewall, devproxy). USER-level state (fish/tmux/claude for the
# dev user) lives in files/ and is applied by setup-user.sh, so it can be
# re-run to converge drift without rebuilding the server.

hostname: ${DEVBOX_NAME}

# Hetzner's vendor config writes 50-cloud-init.conf with PasswordAuthentication yes
# when no ssh_keys are provisioned, and 50- lexically BEATS our 99- drop-in
# (sshd is first-match-wins). This top-level key overrides that at the source.
ssh_pwauth: false

package_update: true
package_upgrade: true
packages:
  - fish
  - ufw
  - unattended-upgrades
  - tmux
  - git
  - gh
  - jq
  - mosh
  - ripgrep
  - fd-find
  - bat
  - fzf
  - zoxide
  - btop
  - ncdu
  - tree
  - unzip
  - neovim
  - locales
  - eza
  - curl
  - python3
  - docker.io
  - docker-compose-v2
  # (mosh intentionally absent — it can't bootstrap through Tailscale SSH; see FOOTGUNS)

users:
  - name: ${DEV_USER}
    groups: sudo
    sudo: "ALL=(ALL) NOPASSWD:ALL"
    # Set fish directly here — useradd just records the path in /etc/passwd (it
    # doesn't require the shell to exist yet; the final-stage package install
    # provides it before anyone logs in). A `chsh` in runcmd FAILS on this user:
    # lock_passwd leaves no password, and chsh's PAM stack rejects that.
    shell: /usr/bin/fish
    lock_passwd: true

swap:
  filename: /swapfile
  size: 2G
  maxsize: 2G

write_files:
  - path: /etc/ssh/sshd_config.d/99-hardening.conf
    content: |
      PermitRootLogin prohibit-password
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      PermitEmptyPasswords no
      MaxAuthTries 3
      LoginGraceTime 30
      X11Forwarding no

  - path: /etc/sysctl.d/99-devbox.conf
    content: |
      vm.swappiness = 10
      net.core.default_qdisc = fq
      net.ipv4.tcp_congestion_control = bbr

  - path: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";

  - path: /etc/apt/apt.conf.d/52-autoreboot.conf
    content: |
      Unattended-Upgrade::Automatic-Reboot "true";
      Unattended-Upgrade::Automatic-Reboot-Time "04:00";

  # Docker publishes ports via its own NAT chains, BYPASSING ufw entirely —
  # a plain `-p 8080:80` would be internet-reachable despite default-deny.
  # Defaulting the publish address to loopback closes that hole, and the
  # tailnet-devproxy makes loopback ports reachable at http://<name>:<port>
  # from the tailnet anyway. (An explicit `-p 0.0.0.0:...` still bypasses.)
  - path: /etc/docker/daemon.json
    content: |
      { "ip": "127.0.0.1" }

  - path: /etc/profile.d/vite-allowed-hosts.sh
    content: |
      # Vite's dev-server host check rejects non-localhost hostnames. This env var
      # whitelists the tailnet name so http://${DEVBOX_NAME}:<port> works.
      # FOOTGUN: Vite parses this as EXACTLY ONE host — never a comma list.
      export __VITE_ADDITIONAL_SERVER_ALLOWED_HOSTS="${DEVBOX_NAME}"

  - path: /usr/local/bin/tailnet-devproxy.py
    permissions: "0755"
    content: |
      #!/usr/bin/env python3
      """Transparent tailnet->localhost proxy. iptables REDIRECTs tailnet TCP here;
      we recover the original destination port via SO_ORIGINAL_DST and dial localhost.
      This is what makes http://devbox:<port> reach dev servers bound only to
      127.0.0.1 or ::1 (plain kernel REDIRECT cannot deliver to loopback binds)."""
      import asyncio, socket, struct

      SO_ORIGINAL_DST = 80
      PROXY_PORT = 15100

      async def pipe(reader, writer):
          try:
              while True:
                  data = await reader.read(65536)
                  if not data:
                      break
                  writer.write(data)
                  await writer.drain()
          except (ConnectionError, asyncio.CancelledError):
              pass
          finally:
              try:
                  writer.close()
              except Exception:
                  pass

      async def handle(reader, writer):
          sock = writer.get_extra_info("socket")
          try:
              if sock.family == socket.AF_INET:
                  raw = sock.getsockopt(socket.SOL_IP, SO_ORIGINAL_DST, 16)
              else:
                  raw = sock.getsockopt(socket.IPPROTO_IPV6, SO_ORIGINAL_DST, 28)
              port = struct.unpack("!H", raw[2:4])[0]
          except OSError:
              writer.close()
              return
          if port == PROXY_PORT:
              writer.close()
              return
          r2 = None
          for target in ("::1", "127.0.0.1"):
              try:
                  r2, w2 = await asyncio.open_connection(target, port)
                  break
              except OSError:
                  r2 = None
          if r2 is None:
              writer.close()
              return
          await asyncio.gather(pipe(reader, w2), pipe(r2, writer))

      async def main():
          v4 = await asyncio.start_server(handle, "0.0.0.0", PROXY_PORT, family=socket.AF_INET)
          s6 = socket.socket(socket.AF_INET6, socket.SOCK_STREAM)
          s6.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
          s6.setsockopt(socket.IPPROTO_IPV6, socket.IPV6_V6ONLY, 1)
          s6.bind(("::", PROXY_PORT))
          v6 = await asyncio.start_server(handle, sock=s6)
          async with v4, v6:
              await asyncio.gather(v4.serve_forever(), v6.serve_forever())

      asyncio.run(main())

  - path: /etc/systemd/system/tailnet-devproxy.service
    content: |
      [Unit]
      Description=Transparent proxy: tailnet TCP -> localhost services
      After=network.target

      [Service]
      ExecStart=/usr/bin/python3 /usr/local/bin/tailnet-devproxy.py
      Restart=always
      RestartSec=2
      DynamicUser=yes

      [Install]
      WantedBy=multi-user.target

  - path: /etc/systemd/system/tailnet-localhost-redirect.service
    content: |
      [Unit]
      Description=Redirect tailnet TCP (unprivileged ports) to the tailnet-devproxy
      After=network.target
      Wants=tailnet-devproxy.service

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      ExecStart=/bin/sh -c 'for ipt in iptables ip6tables; do $ipt -t nat -N TAILNET-DEV 2>/dev/null; $ipt -t nat -F TAILNET-DEV; $ipt -t nat -A TAILNET-DEV -p tcp --dport 15100 -j RETURN; $ipt -t nat -A TAILNET-DEV -p tcp --dport 1024:65535 -j REDIRECT --to-ports 15100; $ipt -t nat -C PREROUTING -i tailscale0 -p tcp -j TAILNET-DEV 2>/dev/null || $ipt -t nat -A PREROUTING -i tailscale0 -p tcp -j TAILNET-DEV; done'

      [Install]
      WantedBy=multi-user.target

runcmd:
  - locale-gen en_US.UTF-8
  - sysctl --system
  - usermod -aG docker ${DEV_USER}
  - systemctl restart ssh || true
  # Join the tailnet unattended. --ssh enables Tailscale SSH (the only SSH path:
  # no authorized_keys exist anywhere). --operator lets the dev user run
  # tailscale commands (serve, status) without sudo. Retry: a transient failure
  # here leaves the box unreachable (recovery = Hetzner console pw reset).
  - curl -fsSL https://tailscale.com/install.sh | sh
  - for i in 1 2 3; do tailscale up --authkey=${TS_AUTHKEY} --ssh --hostname=${DEVBOX_NAME} --operator=${DEV_USER} && break; sleep 10; done
  # Firewall: public internet sees ONLY tailscale's UDP port. SSH/HTTP/everything
  # else rides the tailnet (allow in on tailscale0).
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 41641/udp comment 'tailscale direct'
  - ufw allow in on tailscale0 comment 'tailnet traffic'
  - ufw --force enable
  # ufw enable restores the filter table WITHOUT --noflush, wiping the FORWARD
  # chains dockerd installed during package install — container egress would be
  # dead until dockerd re-adds them. Restarting docker after ufw fixes ordering.
  - systemctl restart docker
  - systemctl daemon-reload
  - systemctl enable --now tailnet-devproxy.service tailnet-localhost-redirect.service
  - systemctl enable --now unattended-upgrades

# Reboot only if the upgrade staged one (kernel/libc), via the module built for
# it: power_state runs dead-last with clean teardown. A bare `reboot` in runcmd
# interrupts cloud-init mid-final-stage and can re-run runcmd on second boot.
power_state:
  mode: reboot
  condition: test -f /var/run/reboot-required
